spring:
  application:
    name: orderProcessingSystem

  datasource:
    url: jdbc:mysql://localhost:3306/orderprocessingsystem
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  background:
      jobs:
        processOrder : 0 */5 * * * *